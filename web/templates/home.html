<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/../static/css/style.css">
    <title>Current Tasks and Create Task</title>
</head>
<body>
<h2 class="card-title">Add New Task</h2>

<form method="POST" action="{% url 'create_task' %}">
    {% csrf_token %}
    <div class="col-md-6">
        <label for="{{ form.title.id_for_label }}" class="form-label">Task </label>
        {{ form.title }}
    </div>
    <div>
        <label for="{{ form.context.id_for_label }}" class="form-label">Context</label>
        {{ form.context }}
    </div>
    <div>
        <label for="{{ form.project.id_for_label }}" class="form-label">Project</label>
        {{ form.project }}
    </div>
    <div>
    <button type="submit" class="btn btn-primary">Add Task</button>
    </div>
</form> 


<div class="col-md-6">
<h2>List of tasks</h2>

{% block content %}
<ul>
    {% for task in tasks %}
      <li>@ {{ task.context }} - {{ task.title }} - <i>project</i> {{ task.project }}</li>
    {% endfor %}
  </ul>
{% endblock %}
</div>
</body>
</html>
