# azure-pipelines.yml
# Docker build + push pipeline for Azure DevOps

trigger:
  - main

variables:
  imageName: pythonapp
  dockerfilePath: Dockerfile
  containerRegistryServiceConnection: 8a7c3aae-cd07-43df-8e1c-f3eef056dc6c
  containerRegistry: smallacr042022.azurecr.io
  tag: $(Build.BuildId)

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: Build and Push Docker Image

    jobs:
      - job: DockerBuild
        displayName: Docker Build Job

        steps:
          - checkout: self

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: $(containerRegistryServiceConnection)

          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              repository: $(imageName)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(containerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              repository: $(imageName)
              containerRegistry: $(containerRegistryServiceConnection)
              tags: |
                $(tag)
                latest