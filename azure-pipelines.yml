# Azure DevOps Pipeline for Docker Build and Push to Docker Hub
# Replace DOCKERHUB_USERNAME and DOCKERHUB_PASSWORD with your Azure DevOps secret variable names

trigger:
  - main  # 1. Trigger: Run on push to main branch

variables:
  imageName: annainterwebs1/python-apps  # Change to your Docker Hub repo

pool:
  vmImage: 'ubuntu-latest'  # 3. Use Ubuntu agent

steps:
  - checkout: self  # 4. Checkout code

  - script: |
      echo "Logging in to Docker Hub"
      echo $(DOCKERHUB_PASSWORD) | docker login -u $(DOCKERHUB_USERNAME) --password-stdin
    displayName: 'Login to Docker Hub'  # 5. Login step

  - script: |
      docker build -t $(imageName):$(Build.BuildId) .
    displayName: 'Build Docker Image'  # 6. Build image

  - script: |
      docker push $(imageName):$(Build.BuildId)
    displayName: 'Push Docker Image'  # 7. Push image

  - script: |
      docker logout
    displayName: 'Logout from Docker Hub'  # 8. Logout
