trigger:
  branches:
    include:
      - main
      - master

pr: none

variables:
  - group: awsecrpipe
  # Override these with your actual values:
  - name: ECR_REGISTRY
    value: "054375299886.dkr.ecr.us-east-1.amazonaws.com"   # e.g. <account_id>.dkr.ecr.<region>.amazonaws.com
  - name: ECR_REPO_WEB
    value: "pynamespace/python-repo-name"                                    # ECR repo name for web service
  - name: ECR_REPO_DB
    value: "pynamespace/python-repo-name"                                     # ECR repo name for db service
  - name: AWS_REGION
    value: "us-east-1"                                     # your ECR region
  - name: IMAGE_TAG
    value: "$(Build.BuildId)"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build_and_Push
    displayName: "Build & Push to ECR"
    jobs:
      - job: Build
        displayName: "Docker Build & ECR Push"
        steps:

          # ── 1. Checkout ────────────────────────────────────────────────
          - checkout: self
            displayName: "Checkout source"

          # ── 2. Install AWS CLI (pre-installed on ubuntu-latest,
          #        but this ensures it's up to date) ─────────────────────
          - script: |
              aws --version
            displayName: "Verify AWS CLI"
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_DEFAULT_REGION: $(AWS_REGION)

          # ── 3. Authenticate Docker to ECR ──────────────────────────────
          - script: |
              aws ecr get-login-password --region $(AWS_REGION) \
                | docker login --username AWS --password-stdin $(ECR_REGISTRY)
            displayName: "ECR Docker login"
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_DEFAULT_REGION: $(AWS_REGION)

          # ── 4. Build images via Docker Compose (fmly docker compose build web db)────────────────────────
          - script: |
              docker build 
            displayName: "docker compose build (web, db)"
            workingDirectory: $(Build.SourcesDirectory)

          # ── 5. Tag & push — web ───────────────────────────────────────
          - script: |
              # Grab the image name Compose assigned, then retag for ECR
              WEB_IMAGE=$(docker compose images -q web)

              docker tag "$WEB_IMAGE" $(ECR_REGISTRY)/$(ECR_REPO_WEB):$(IMAGE_TAG)
              docker tag "$WEB_IMAGE" $(ECR_REGISTRY)/$(ECR_REPO_WEB):latest

              docker push $(ECR_REGISTRY)/$(ECR_REPO_WEB):$(IMAGE_TAG)
              docker push $(ECR_REGISTRY)/$(ECR_REPO_WEB):latest
            displayName: "Tag & push web → ECR"

          # ── 6. Tag & push — db ────────────────────────────────────────
          - script: |
              DB_IMAGE=$(docker compose images -q db)

              docker tag "$DB_IMAGE" $(ECR_REGISTRY)/$(ECR_REPO_DB):$(IMAGE_TAG)
              docker tag "$DB_IMAGE" $(ECR_REGISTRY)/$(ECR_REPO_DB):latest

              docker push $(ECR_REGISTRY)/$(ECR_REPO_DB):$(IMAGE_TAG)
              docker push $(ECR_REGISTRY)/$(ECR_REPO_DB):latest
            displayName: "Tag & push db → ECR"

          # ── 7. Summary ────────────────────────────────────────────────
          - script: |
              echo "##vso[task.setvariable variable=WEB_IMAGE_URI;isOutput=true]$(ECR_REGISTRY)/$(ECR_REPO_WEB):$(IMAGE_TAG)"
              echo "##vso[task.setvariable variable=DB_IMAGE_URI;isOutput=true]$(ECR_REGISTRY)/$(ECR_REPO_DB):$(IMAGE_TAG)"
              echo "✅ Web : $(ECR_REGISTRY)/$(ECR_REPO_WEB):$(IMAGE_TAG)"
              echo "✅ DB  : $(ECR_REGISTRY)/$(ECR_REPO_DB):$(IMAGE_TAG)"
            displayName: "Print pushed image URIs"
            name: summary