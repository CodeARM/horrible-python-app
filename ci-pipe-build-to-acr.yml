# azure-pipelines.yml
# Docker build + push pipeline for Azure DevOps

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  imageName: my-app
  dockerfilePath: Dockerfile
  containerRegistryServiceConnection: my-acr-service-connection
  containerRegistry: myregistry.azurecr.io
  tag: $(Build.BuildId)

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Build
    displayName: Build and Push Docker Image

    jobs:
      - job: DockerBuild
        displayName: Docker Build Job

        steps:
          - checkout: self

          - task: Docker@2
            displayName: Login to ACR
            inputs:
              command: login
              containerRegistry: $(containerRegistryServiceConnection)

          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              repository: $(imageName)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(containerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: Push Docker Image
            inputs:
              command: push
              repository: $(imageName)
              containerRegistry: $(containerRegistryServiceConnection)
              tags: |
                $(tag)
                latest